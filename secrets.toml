# Copy this file to .streamlit/secrets.toml (same folder) and fill in
# whichever ONE key you actually have. explain.py tries them in this order:
# Anthropic -> Gemini -> OpenAI, and silently falls back to a template-based
# explanation if none are set or the call fails for any reason.
#
# .streamlit/secrets.toml is how Streamlit apps keep API keys out of source
# control while still making them available to the running app via
# st.secrets -- set this ONCE here at deploy time and end users of the app
# never need to see, enter, or know about any API key.
#
# IMPORTANT: only secrets.toml.example (this file) should be committed.
# The real secrets.toml must never be committed -- see .gitignore.

#ANTHROPIC_API_KEY = "sk-ant-..."
# GOOGLE_API_KEY = "..."
#GEMINI_API_KEY = "..."
# OPENAI_API_KEY = "sk-..."
